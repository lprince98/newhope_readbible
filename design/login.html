<body class="min-h-screen bg-surface-container-low font-ui-label text-on-background relative overflow-hidden flex items-center justify-center">
<!-- Ambient Background Image -->
<div class="absolute inset-0 bg-cover bg-center bg-no-repeat opacity-20 pointer-events-none" data-alt="Soft morning sunlight streaming over an open Bible on a wooden table, warm golden hour tones, soft focus, reverent and peaceful atmosphere, subtle grain texture" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBS6oKrRhaQOJnOh6FeD1rPNL853_WCG_SdAnuFDilZUasIAQTCWbEGRNo4TEh4vmvkoOyBzvSo62LPTnAc9I7WOodTCsn7FocQDXxCZM8_wS40onl3SVO-cmYv_yRckOxzTgKy7nqjQfxU4D_u_qmaIfIch2GoLGqJAN5paIQ-Nla2Z_ARaNo-l66OcMuV5HdfmtxQD-KMHJYhAvAOz1nHfZ4y6whIPzSlPkcqmSvuMEIvt4UGgebwvLIWnuJLsCcPfbukVTZ13Q8');">
</div>
<!-- Main Content Canvas (Transactional Screen -> No Nav Shells) -->
<main class="w-full max-w-md px-margin-page relative z-10">
<div class="bg-surface rounded-xl shadow-[0_4px_24px_rgba(4,17,41,0.06)] border border-outline-variant/30 p-8 flex flex-col gap-stack-lg">
<!-- Header Identity -->
<div class="flex flex-col items-center text-center gap-stack-sm">
<div class="w-12 h-12 rounded-full bg-secondary-container/30 flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-secondary text-[28px]" style="font-variation-settings: 'FILL' 1;">menu_book</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface tracking-tight">로그인</h1>
<p class="font-scripture-sub text-scripture-sub text-on-surface-variant">말씀으로 시작하는 하루</p>
</div>
<!-- Login Form -->
<form action="#" class="flex flex-col gap-stack-md w-full" method="POST">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-ui-label text-ui-label text-on-surface ml-1" for="email">이메일</label>
<input class="w-full bg-surface-container border border-outline-variant rounded-lg px-4 py-3 font-ui-label text-ui-label text-on-surface focus:outline-none focus:ring-2 focus:ring-secondary/50 focus:border-secondary transition-all placeholder:text-outline/60" id="email" name="email" placeholder="example@email.com" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="font-ui-label text-ui-label text-on-surface ml-1" for="password">비밀번호</label>
<input class="w-full bg-surface-container border border-outline-variant rounded-lg px-4 py-3 font-ui-label text-ui-label text-on-surface focus:outline-none focus:ring-2 focus:ring-secondary/50 focus:border-secondary transition-all placeholder:text-outline/60" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Options Row -->
<div class="flex items-center justify-between mt-1 px-1">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 rounded DEFAULT border-outline-variant text-primary focus:ring-primary/20 bg-surface-container transition-colors cursor-pointer" type="checkbox"/>
<span class="font-caption text-caption text-on-surface-variant group-hover:text-on-surface transition-colors">로그인 상태 유지</span>
</label>
<a class="font-caption text-caption text-secondary hover:text-primary transition-colors" href="#">비밀번호를 잊으셨나요?</a>
</div>
<!-- Submit Action -->
<button class="w-full min-h-[48px] bg-primary text-on-primary font-ui-label text-ui-label py-3 rounded-lg mt-stack-sm hover:bg-primary/90 hover:shadow-[0_2px_8px_rgba(4,17,41,0.15)] active:shadow-none active:scale-[0.98] transition-all flex justify-center items-center" type="submit">
                    로그인
                </button>
</form>
<!-- Secondary Action -->
<div class="text-center pt-stack-sm border-t border-outline-variant/30">
<a class="font-ui-label text-ui-label text-on-surface-variant hover:text-primary transition-colors" href="#">
                    계정이 없으신가요? <span class="text-secondary font-semibold ml-1">회원가입하기</span>
</a>
</div>
</div>
