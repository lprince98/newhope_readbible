<option disabled="" selected="" value="">성경 선택</option>
<option value="genesis">창세기</option>
<option value="exodus">출애굽기</option>
<option value="psalms">시편</option>
<option value="proverbs">잠언</option>
<option value="matthew">마태복음</option>
<option value="mark">마가복음</option>
<option value="luke">누가복음</option>
<option value="john">요한복음</option>

</select>

<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>

<div class="flex-1">

<input class="w-full bg-surface text-center text-on-surface border border-outline-variant rounded-lg py-3 font-headline-md text-headline-md focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all shadow-inner" id="chapter-start" min="1" placeholder="시작" type="number"/>
</div>
<span class="font-ui-label text-outline-variant">—</span>
<div class="flex-1">

</div>
</div>
